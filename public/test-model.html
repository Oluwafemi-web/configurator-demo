<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLTF Model Test</title>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body style="margin: 0; overflow: hidden;">
    <div id="info" style="position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7); padding: 10px; font-family: monospace; font-size: 12px; z-index: 100;">
        Loading model...
    </div>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const info = document.getElementById('info');
        
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xEEEEEE);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);
        
        // Load GLTF model
        const loader = new GLTFLoader();
        const modelPath = '/models/JUMP_SOFA/3D_MODELS/Jump_SeatPouf.gltf';
        
        info.textContent = `Loading: ${modelPath}`;
        console.log('Starting to load model:', modelPath);
        
        loader.load(
            modelPath,
            (gltf) => {
                console.log('Model loaded successfully!', gltf);
                info.textContent = 'Model loaded successfully!';
                info.style.background = 'rgba(0,128,0,0.7)';
                
                const model = gltf.scene;
                model.scale.set(2.5, 2.5, 2.5);
                scene.add(model);
                
                // Center the model
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);
            },
            (progress) => {
                const percent = (progress.loaded / progress.total * 100).toFixed(2);
                info.textContent = `Loading: ${percent}%`;
                console.log('Loading progress:', percent + '%');
            },
            (error) => {
                console.error('Error loading model:', error);
                info.textContent = `Error: ${error.message}`;
                info.style.background = 'rgba(128,0,0,0.7)';
            }
        );
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
